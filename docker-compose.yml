version: "3.9"

services:

  redis:
    image: redis:7
    container_name: tutors-redis
    restart: unless-stopped
    command: redis-server --appendonly yes

    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: 
      - tutors-network

  nginx:
    image: nginx:stable-alpine
    container_name: tutors-nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro     # ro = read-only
    depends_on: 
      - tutors-backend
      - tutors-frontend
    networks:
      - tutors-network


  postgres:
    image: postgres:15
    container_name: tutors-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: Website
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data   # ссылаюсь внизу
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: 
      - tutors-network

  tutors-backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: tutors-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env

    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?connection_limit=10&pool_timeout=30"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      UV_THREADPOOL_SIZE: 8
    expose:
      - "7898"
    networks:
      - tutors-network

  tutors-frontend:
    build: ./frontend
    container_name: tutors-frontend
    restart: always
    ports:
      - "3000:80"
    networks:
      - tutors-network


  #chat-backend:
   # build: ./chatForUsers/backend
    #container_name: chat-backend
    #restart: always
    #depends_on:
     # - postgres
    #environment:
     # DATABASE_URL: "postgresql://postgres:12345@postgres:5432/Website?connection_limit=10&pool_timeout=30"

    #ports:
     # - "9000:9000"

  #chat-frontend:
   # build: ./chatForUsers/frontend
    #container_name: chat-frontend
    #restart: always
    #ports:
     # - "5173:80"

volumes:
  postgres-data:
  redis-data:

networks: 
  tutors-network:
    driver: bridge