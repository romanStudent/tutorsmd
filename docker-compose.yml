services:

  redis:
    image: redis:7
    container_name: tutors-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction  # allkeys-lru удаляет ключи при нехватке памяти — BullMQ задания могут потеряться. noeviction — возвращает ошибку вместо удаления.

    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: 
      - tutors-network
    deploy:
      resources:
        limits:
          memory: 300m
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:stable-alpine
    container_name: tutors-nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro   # ro = read-only
      - ./ssl:/etc/ssl/cloudflare:ro     # ro = read-only
    depends_on: 
      - tutors-backend
      - tutors-frontend
    networks:
      - tutors-network
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"


  postgres:
    image: pgvector/pgvector:pg15
    container_name: tutors-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data   # ссылаюсь внизу
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: 
      - tutors-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tutors-ai:
    build: ./ai
    container_name: tutors-ai
    restart: unless-stopped
    env_file: ./ai/ai-service/.env
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tutors-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
  
  tutors-backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: tutors-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?connection_limit=10&pool_timeout=30"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      UV_THREADPOOL_SIZE: 8
    expose:
      - "7898"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7898/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - tutors-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  tutors-frontend:
    build: ./frontend
    container_name: tutors-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - tutors-network
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  postgres-data:
  redis-data:

networks: 
  tutors-network:
    driver: bridge
