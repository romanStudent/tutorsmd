name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Backend: typecheck + tests ─────────────────────────────
  backend:
    name: Backend — typecheck + tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tutorsmd_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json  # корневой lock

      - name: Install dependencies
        run: npm ci
        # устанавливает ВСЕ workspace зависимости из корня

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tutorsmd_test

      - name: Push schema to test DB
        working-directory: backend
        run: npx prisma db push --force-reset --skip-generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tutorsmd_test

      - name: Typecheck
        working-directory: backend
        run: npx tsc --noEmit

      - name: Unit tests
        working-directory: backend
        run: npm run test:unit
        env:
          DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/tutorsmd_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-for-ci
          JWT_ACCESS_EXPIRES_IN: 900
          PASSWORD_PEPPER: test-pepper-for-ci
          NODE_ENV: test

      - name: Integration tests
        working-directory: backend
        run: npm run test:integration
        env:
          DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/tutorsmd_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-for-ci
          JWT_ACCESS_EXPIRES_IN: 900
          PASSWORD_PEPPER: test-pepper-for-ci
          NODE_ENV: test

  # ── 2. Frontend: typecheck + build ────────────────────────────
  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SOCKET_URL: ${{ secrets.VITE_SOCKET_URL }}

  # ── 3. Deploy — только main ───────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /opt/tutors2

            echo "→ Pulling latest code..."
            git pull origin main

            echo "→ Running migrations..."
            docker compose exec -T tutors-backend npx prisma migrate deploy

            echo "→ Rebuilding containers..."
            docker compose up -d --build tutors-backend tutors-frontend tutors-ai

            echo "→ Cleaning up old images..."
            docker image prune -f

            echo "→ Health check..."
            sleep 10
            curl --fail --silent --show-error https://tutorsmd.net/api/health

            echo "✓ Deploy successful"