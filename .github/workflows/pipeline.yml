name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Backend typecheck ───────────────────────────────────────
  backend-check:
    name: Backend — typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  # ── 2. Frontend typecheck + build ─────────────────────────────
  frontend-check:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SOCKET_URL: ${{ secrets.VITE_SOCKET_URL }}

  # ── 3. Tests ───────────────────────────────────────────────────
  tests:
    name: Tests — unit + integration
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tutorsmd_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tutorsmd_test

      - name: Run migrations
        run: npx prisma db push --force-reset --skip-generate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tutorsmd_test

      - name: Run unit tests
        run: npm run test:unit
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tutorsmd_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-for-ci
          PASSWORD_PEPPER: test-pepper-for-ci
          NODE_ENV: test

      - name: Run integration tests
        run: npm run test:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tutorsmd_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-for-ci
          PASSWORD_PEPPER: test-pepper-for-ci
          NODE_ENV: test

  # ── 4. Deploy — только main, только если всё прошло ───────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check, tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://tutorsmd.net

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e

            cd /opt/tutors2

            echo "→ Pulling latest code..."
            git pull origin main

            echo "→ Running migrations..."
            docker compose exec -T tutors-backend npx prisma migrate deploy

            echo "→ Rebuilding containers..."
            docker compose up -d --build tutors-backend tutors-frontend

            echo "→ Cleaning up old images..."
            docker image prune -f

            echo "→ Health check..."
            sleep 10
            curl --fail --silent --show-error https://tutorsmd.net/api/health

            echo "✓ Deploy successful"