# Rate Limit

# 10m = 10MB
# $binary_remote_addr - IP адрес в бинарном виде (4 байта вместо строки, экономит память)
# Сколько запросов в 1 секунду
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
# Сколько одновременных соединений
limit_conn_zone $binary_remote_addr zone=conn:10m;


# Cloudflare проксирует запросы. 
# nginx должен видеть РЕАЛЬНЫЙ IP клиента, 
# а не IP Cloudflare edge proxy. 
real_ip_header CF-Connecting-IP;


# Доверяю только Cloudflare proxy.
# Иначе хакер может подделать CF-Connecting-IP header. 
set_real_ip_from 173.245.48.0/20; 
set_real_ip_from 103.21.244.0/22; 
set_real_ip_from 103.22.200.0/22; 
set_real_ip_from 103.31.4.0/22; 
set_real_ip_from 141.101.64.0/18; 
set_real_ip_from 108.162.192.0/18; 
set_real_ip_from 190.93.240.0/20; 
set_real_ip_from 188.114.96.0/20; 
set_real_ip_from 197.234.240.0/22; 
set_real_ip_from 198.41.128.0/17; 
set_real_ip_from 162.158.0.0/15; 
set_real_ip_from 104.16.0.0/13; 
set_real_ip_from 104.24.0.0/14; 
set_real_ip_from 172.64.0.0/13; 
set_real_ip_from 131.0.72.0/22; 
# Корректная обработка proxy chain. 
real_ip_recursive on;



# BACKEND UPSTREAM upstream 
upstream backend { 
    server tutors-backend:7898; 
    keepalive 32; 
}

upstream frontend { 
    server tutors-frontend:80; 
    keepalive 16; 
}


# HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;     # add IPv6
    server_name tutorsmd.net www.tutorsmd.net;   # прослушивание домена и поддомена

    access_log off;   # иначе бы просто засорялись логами редиректами 301

    # location для HTTP
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    # 301 - это не "сайт переехал". Это "этот URL всегда доступен по HTTPS". Браузер запоминает: если пользователь вводит http://tutorsmd.net — сразу идёт на HTTPS без дополнительного запроса
    # return 301 https://$host$request_uri;
}

# HTTPS
server {
    # TLS/SSL — это не "шифрование" Это: identity, trust, authentication, key exchange, integrity, confidentiality
    listen 443 ssl;
    listen [::]:443 ssl;   # add IPv6
    http2 on;
    server_name tutorsmd.net www.tutorsmd.net;

    access_log /var/log/nginx/tutors-access.log;
    error_log /var/log/nginx/tutors-error.log warn;

  
    ssl_certificate     /etc/ssl/cloudflare/tutorsmd.net.pem;
    ssl_certificate_key /etc/ssl/cloudflare/tutorsmd.net.key;

    ssl_protocols TLSv1.2 TLSv1.3;

    ## RSA или ECC - Nginx сам выберет нужный cipher в зависимости от типа сертификата.
    ## Я создам ECC, потому что он быстрее в 10 раз делает TLS-handshake
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers off - Выключает приоритет сервера при выборе шифра. Раньше включали чтобы сервер навязывал "лучший" шифр. Сейчас выключают потому что современные клиенты (TLS 1.3) сами выбирают хорошие шифры — доверяем клиенту.
    ssl_prefer_server_ciphers off; 

    # Session resumption - ускоряет повторные подключения
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling - проверка отзыва сертификата без запроса к CA
    # Не browser спрашивает CA. А server заранее получает OCSP response.
    # то есть OSCP нужен, чтобы не ходить Browser -> Server -> Browser -> CA OSCP Server, а сразу Server -> CA,
    # Тогда browser получает всё сразу: cert + revocation proof
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # resolver 1.1.1.1 8.8.8.8 valid=300s;
    # OCSP stapling — не нужен с Cloudflare Origin Certificate
    # Cloudflare сам проверяет отзыв между собой и клиентом
    # ssl_stapling on;

    ########################### ЗАЩИТА #############################################################
    # Запрет встраивания в iframe - защита от clickjacking
    add_header X-Frame-Options "DENY" always;
 
    # Запрет MIME sniffing - браузер не угадывает тип контента
    add_header X-Content-Type-Options "nosniff" always;
 
    # Управление Referer заголовком
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
 
    # Отключение ненужных браузерных API
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(), payment=(self)" always;
    #################################################################################################


    # HSTS - только HTTPS на 1 год, включая поддомены
    # Добавлять только когда SSL точно работает
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;


    # CSP - контент только с tutorsmd.net
    # Начну с report-only, потом переключу на enforce, когда стаблизирую весь сайт
    # 1) enforce -> браузер БЛОКИРУЕТ ресурсы которые нарушают политику
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://tutorsmd.net https://*.cloudflare.com; script-src-elem 'self' 'unsafe-inline' https://tutorsmd.net https://*.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss://tutorsmd.net https://tutorsmd.net https://*.cloudflare.com https://*.r2.cloudflarestorage.com; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;

    # Скрыть версию nginx
    server_tokens off;

    # SIZE LIMITS
    client_max_body_size 10m;
    client_body_timeout 12s;
    client_header_timeout 12s;
    keepalive_timeout 15s;
    send_timeout 10s;

    # Лимит соединений с 1 IP
    limit_conn conn 20;


################ COMPRESSION ############################################## 
    gzip on; 
    gzip_min_length 1000; 
    gzip_types 
        text/plain 
        text/css 
        application/json 
        application/javascript 
        text/xml 
        application/xml 
        image/svg+xml;


####### FRONTEND ##################################################################
# Location для HTTPS
    location / {

        proxy_pass http://frontend;

        # HTTP/1.0 — не поддерживает keep-alive и chunked transfer
        # МОЙ ВЫБОР: HTTP/1.1 — поддерживает keep-alive (одно соединение для многих запросов). Между nginx и Node.js - HTTP/1.1 это стандарт
        # HTTP/2   — между nginx и backend не нужен, только для клиентов
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


###### BACKEND. API ########################################################################
    location /api/ {
        
        # Общий rate limit: 30 запросов/сек 
        # Но MAX ЗАПРОСОВ = burst до 60. То есть в момент можно сделать всплеск 60 запросов, но они станут в очередь, если НЕ ПОСТАВИТЬ NODEPLAY
        # С NODEPLAY: Пришло 60 запросов сразу → все 60 обработаны сразу, но burst исчерпан. Следующие запросы → 429 пока burst не восстановится
        limit_req zone=api burst=60 nodelay;
      
        proxy_pass http://backend;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 60s;

        access_log /var/log/nginx/api-access.log;
    }

###### BACKEND. API. AUTH #####################################################################
    location /api/auth/login {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/register {
        limit_req zone=auth burst=2 nodelay;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

     location /api/auth/forgot-password {
        limit_req zone=auth burst=2 nodelay;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


##### BACKEND. WEBSOCKET(SOCKET.IO) #############################################################
    location /socket.io/ {

        proxy_pass http://backend;

        proxy_http_version 1.1;

        # UPGRADE
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        access_log off;
    }



    location = /index.html {
        proxy_pass http://frontend;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        proxy_set_header Host $host;
    }
    # Запрет доступа к скрытым файлам
    location ~ /\. {
        deny all;
        return 404;
    }
}

server {
    server_name ai.tutorsmd.net;

    location / {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
